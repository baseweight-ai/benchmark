# Inference costs for API models are fetched dynamically via litellm.
# Only add entries here for costs litellm cannot provide (e.g. fine-tuning).
apis:
  gpt-4.1-nano:
    training_per_m: 25.00
  gpt-4.1-mini:
    training_per_m: 25.00

self_hosted:
  # Hourly rental rate for the GPU used in production inference.
  # Adjust to match your target hardware (e.g. A100 ~$2.00, H100 ~$3.50, 4090 ~$0.50).
  gpu_hourly_rate: 0.49
  # Fallback queries-per-hour estimate used only when avg_latency_ms is unavailable.
  queries_per_hour_per_gpu: 2000
