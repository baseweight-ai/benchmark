tasks:
  - all

local_models:
  - all

api_models:
  - all

smoke_test: false
dry_run: false
# Test metrics are reported as mean ± spread across this many eval seeds.
# Seed 0 uses the canonical test set; seeds 1+ resample from test_full.jsonl.
# Each extra seed re-runs eval-local (GPU) and eval-api (OpenAI API spend).
n_eval_seeds: 3

timeouts:
  download_s: 1800
  prepare_s: 1800
  train_local_s: 43200   # 12 h
  eval_local_s: 7200     # 2 h
  eval_api_s: 3600       # 1 h
  classify_s: 1800
  dashboard_s: 300
  catalog_s: 60
