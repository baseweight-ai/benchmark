task_id: banking77
task_name: "Customer Support Routing"
dataset_path: "PolyAI/banking77"
dataset_config: null
# PolyAI/banking77 ships a custom loading script. Without this the Hub
# download falls back to a stale or empty default and silently breaks
# prepare_datasets.py. If load_dataset() still rejects the script (e.g.
# `datasets` was upgraded and dropped script loaders), download the Parquet
# shards listed in the dataset's loading script directly from GitHub and
# point dataset_path at them via `load_dataset("parquet", data_files=...)`.
trust_remote_code: true
task_type: classification
num_classes: 77
metric_id: weighted_f1
metric_label: "Weighted F1"
# per_class_weighted: each of 77 classes contributes to F1 weighted by its support (sample
# count in the test set). Appropriate because test sampling mirrors real query distribution
# (stratified, total_cap=500), so majority-class performance gets proportional influence.
metric_granularity: per_class_weighted
max_output_tokens: 32
lm_eval_task_id: banking77
train_sampling:
  strategy: balanced
  stratify_by: label
  per_group_cap: 30
  seed: 42
test_sampling:
  strategy: stratified
  stratify_by: label
  total_cap: 500
  min_per_group: 1
  seed: 42
eval_axes: [accuracy, cost, latency, instruction_following]
prompt_file: "prompts/banking77.json"
text_field: text
label_field: label
label_type: integer_mapped
epochs_by_size:
  small: 10
  medium: 5
  large: 3
max_seq_length: 1024
