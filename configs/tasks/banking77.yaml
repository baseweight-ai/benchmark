task_id: banking77
task_name: "Customer Support Routing"
dataset_path: "PolyAI/banking77"
dataset_config: null
# PolyAI/banking77 ships a custom loading script, which datasets 4.x can no
# longer execute. Pin to the Hub's auto-generated Parquet conversion instead.
dataset_revision: "refs/convert/parquet"
task_type: classification
num_classes: 77
metric_id: weighted_f1
metric_label: "Weighted F1"
# per_class_weighted: each of 77 classes contributes to F1 weighted by its support (sample
# count in the test set). Appropriate because test sampling mirrors real query distribution
# (stratified, total_cap=500), so majority-class performance gets proportional influence.
metric_granularity: per_class_weighted
max_output_tokens: 32
lm_eval_task_id: banking77
# Stratified with a floor: banking77's train pool is nearly balanced
# (35-187 per class, 77 classes). Test ships balanced (40/class), so the
# headline reason to switch from `balanced/30` is NOT distribution alignment
# (it was roughly aligned already) but rather data volume. The previous
# `per_group_cap=30` discarded 60-80% of available rows on most classes.
# total_cap=5000 with min_per_group=35 (= the smallest available class) uses
# ~2× more data and still guarantees every class gets at least 35 rows.
train_sampling:
  strategy: stratified
  stratify_by: label
  total_cap: 5000
  min_per_group: 35
  seed: 42
test_sampling:
  strategy: stratified
  stratify_by: label
  total_cap: 500
  min_per_group: 1
  seed: 42
eval_axes: [accuracy, cost, latency, instruction_following]
prompt_file: "prompts/banking77.json"
text_field: text
label_field: label
label_type: integer_mapped
epochs_by_size:
  small: 10
  medium: 5
  large: 3
max_seq_length: 1024

# early_stopping_patience=1: same compute-saving lesson the FPB sweep
# documented — when the val-loss curve clearly overfits (bottoms then climbs),
# stopping at the next worsening eval gives the same final model
# (load_best_model_at_end restores the optimum) at ~50% less wall time. If
# this task happens NOT to overfit within the epoch cap, patience setting is
# moot, so this is free option value.
training_overrides:
  early_stopping_patience: 1
