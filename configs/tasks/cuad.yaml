task_id: cuad
task_name: "Contract Clause Extraction"
dataset_path: "chenghao/cuad_qa"
dataset_config: null
task_type: extraction
metric_id: token_f1
metric_label: "Token F1"
# per_example: arithmetic mean of per-document token-level F1 (SQuAD-style). Each
# contract clause question is equally weighted regardless of span length or clause type.
# An alternative is per_class_macro averaging over clause types, but per-document
# averaging is standard for extraction benchmarks.
metric_granularity: per_example
max_output_tokens: 512
lm_eval_task_id: null
train_sampling:
  strategy: stratified
  stratify_by: clause_type
  total_cap: 3000
  min_per_group: 5
  seed: 42
test_sampling:
  strategy: stratified
  stratify_by: clause_type
  total_cap: 500
  min_per_group: 1
  seed: 42
eval_axes: [token_f1, cost, latency]
prompt_file: "prompts/cuad.json"
context_max_tokens: 750
skip_conditions: [5-shot]
epochs_by_size:
  small: 10
  medium: 5
  large: 3
max_seq_length: 2048
