task_id: fpb
task_name: "Financial Sentiment"
dataset_path: "warwickai/financial_phrasebank_mirror"
dataset_config: null
task_type: classification
num_classes: 3
metric_id: macro_f1
metric_label: "Macro F1"
# Macro-F1 equally weights each sentiment class regardless of support.
# Justified for FPB because (a) training is balanced (200/200/200 after
# sampling), so the model is taught to handle each class equally, and
# (b) the minority "negative" class (~11% of real-world distribution) is
# the most consequential signal for financial sentiment — a missed
# negative is a missed alert. Use weighted_f1 instead if reporting
# real-world-prevalence-weighted performance is the priority.
metric_granularity: per_class_macro
max_output_tokens: 32
lm_eval_task_id: null
train_sampling:
  strategy: balanced
  stratify_by: label
  per_group_cap: 200
  seed: 42
test_sampling:
  strategy: stratified
  stratify_by: label
  total_cap: 150
  min_per_group: 10
  seed: 42
eval_axes: [accuracy, cost, latency, instruction_following]
prompt_file: "prompts/fpb.json"
text_field: sentence
label_field: label
label_type: integer_mapped
custom_label_names: ["negative", "neutral", "positive"]
split_ratios: [0.85, 0.15]
split_seed: 42
epochs_by_size:
  small: 10
  medium: 5
  large: 3

# Tiny dataset (~600 rows after balanced sampling) — conservative LR and high
# weight_decay keep the LoRA adapter close to zero so the effective model
# stays close to pretrained (catastrophic-forgetting mitigation).
training_overrides:
  learning_rate: 2.0e-5
  weight_decay: 0.1
  warmup_ratio: 0.1
