task_id: ledgar
task_name: "Legal Document Classification"
dataset_path: "coastalcph/lex_glue"
dataset_config: "ledgar"
task_type: classification
num_classes: 100
metric_id: macro_f1
metric_label: "Macro F1"
# 100 provision types follow a power-law distribution. Macro-F1 equally
# weights each class regardless of support, which is the rigorous choice
# when rare-but-critical clauses (e.g. Anti-Corruption Laws, Sanctions,
# Indemnifications) matter as much as common boilerplate. Switch to
# weighted_f1 only if reporting throughput-proportional performance.
metric_granularity: per_class_macro
max_output_tokens: 32
lm_eval_task_id: ledgar
# Stratified with a floor: ledgar's 100 classes follow a steep power law
# (23-3167 rows per class in raw train; the test set is similarly imbalanced).
# Train/test now share the natural prior. min_per_group=30 ensures rare
# clause types still get enough supervision for macro-F1 — when the pool only
# holds 23, the floor degrades gracefully to "all available". total_cap=8000
# uses ~2.7× more data than the previous `per_group_cap=30` (3000 rows).
train_sampling:
  strategy: stratified
  stratify_by: label
  total_cap: 8000
  min_per_group: 30
  seed: 42
test_sampling:
  strategy: stratified
  stratify_by: label
  total_cap: 1000
  min_per_group: 1
  seed: 42
eval_axes: [accuracy, cost, latency, instruction_following]
prompt_file: "prompts/ledgar.json"
text_field: text
label_field: label
label_type: integer_mapped
epochs_by_size:
  small: 10
  medium: 5
  large: 3

# early_stopping_patience=1: compute-saving lesson from the FPB sweep —
# overfit-then-stop runs reach the same final model under load_best at ~50%
# less wall time. Free option value when the task happens not to overfit.
training_overrides:
  early_stopping_patience: 1
