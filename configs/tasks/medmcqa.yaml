task_id: medmcqa
task_name: "Medical Question Answering"
dataset_path: "openlifescienceai/medmcqa"
dataset_config: null
task_type: classification
num_classes: 4
metric_id: accuracy
metric_label: "Accuracy"
# per_example: MCQ answer choices (A/B/C/D) are balanced across questions by construction,
# so per-example accuracy is equivalent to micro-F1 and macro-F1 here. Each question
# is weighted equally regardless of medical subject. Use weighted_f1 if you need to
# account for imbalanced subject-area sampling in the test set.
metric_granularity: per_example
max_output_tokens: 8
test_split: validation
lm_eval_task_id: medmcqa
train_sampling:
  strategy: stratified
  stratify_by: subject_name
  total_cap: 2500
  min_per_group: 10
  seed: 42
test_sampling:
  strategy: stratified
  stratify_by: subject_name
  total_cap: 500
  min_per_group: 1
  seed: 42
eval_axes: [accuracy, cost, latency, instruction_following]
prompt_file: "prompts/medmcqa.json"
label_field: cop
label_type: letter_mapped
label_map: {0: "A", 1: "B", 2: "C", 3: "D"}
epochs_by_size:
  small: 10
  medium: 5
  large: 3
