task_id: medmcqa
task_name: "Medical Question Answering"
dataset_path: "openlifescienceai/medmcqa"
dataset_config: null
task_type: classification
num_classes: 4
metric_id: accuracy
metric_label: "Accuracy"
# Each question has exactly one correct option and the model emits exactly one
# answer letter, so Accuracy = Exact-Match = Precision@1 = micro-F1 are all the
# same 0/1-per-question quantity here. classify_errors reports metric_value
# (accuracy), exact_match and precision_at_1 — identical by construction for a
# single-best-answer MCQ. Each question is weighted equally regardless of
# medical subject. NOTE: the correct-answer letter is NOT uniformly distributed
# (MedMCQA skews ~A 32% / D 18%), so accuracy does not coincide with macro-F1 —
# report the majority-class baseline (~33%) for context.
metric_granularity: per_example
# answer_mode: tagged — the model is trained and prompted to emit a chain-of-thought
# in <thinking>...</thinking> followed by <answer>X</answer>. classify_errors extracts
# the <answer> letter before scoring. The output is deliberately NOT constrained-decoded:
# a free-form CoT cannot be pinned to a fixed label set, so guided_choice / response_format
# are disabled for this task (see eval_local.py / eval_api.py).
answer_mode: tagged
# CoT answers need room for the <thinking> block plus <answer>X</answer>. Dataset
# explanations average ~115 tokens (p90 ~260); 512 leaves generous headroom so the
# closing <answer> tag is reached before the generation budget runs out.
max_output_tokens: 512
test_split: validation
lm_eval_task_id: medmcqa
train_sampling:
  strategy: stratified
  stratify_by: subject_name
  total_cap: 2500
  min_per_group: 10
  seed: 42
test_sampling:
  strategy: stratified
  stratify_by: subject_name
  total_cap: 500
  min_per_group: 1
  seed: 42
eval_axes: [accuracy, cost, instruction_following]
prompt_file: "prompts/medmcqa.json"
label_field: cop
label_type: letter_mapped
label_map: {0: "A", 1: "B", 2: "C", 3: "D"}
epochs_by_size:
  small: 10
  medium: 5
  large: 3
