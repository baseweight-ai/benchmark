[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: fast, no external dependencies
    integration: may require installed libraries (sklearn, pydantic, yaml)
    smoke: end-to-end pipeline with mocked APIs
    slow: requires GPU, real model download, or significant CPU (run on RunPod)
# --strict-markers: typo'd or undeclared markers fail the run instead of
# silently passing. Forces marker hygiene as new tests are added.
addopts = -q --tb=short --strict-markers

# Coverage runs are opt-in (they slow the suite ~3x). Configuration lives
# in .coveragerc; threshold currently 70% on the testable library surface.
#
# Common invocations:
#   pytest                          # full suite, fast
#   pytest -m unit                  # unit tests only, ~10s
#   pytest -m "not slow"            # everything except GPU/long-running
#   pytest --cov                    # full suite + coverage report + 70% gate
#   pytest --cov --cov-report=html  # writes htmlcov/ for browsable report
